---
# tasks file for firewall
- name: Installer ufw
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: yes

- name: Desactiver par defaut tous les trafics entrants
  community.general.ufw:
    default: deny
    direction: incoming

- name: Autoriser par defaut tous les trafics sortants
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Autoriser les ports nécessaires
  community.general.ufw:
    rule: allow
    port: "{{item.split('/')[0]}}"
    proto: "{{item.split('/')[1]}}"
  loop: "{{ ufw_allowed_ports }}"

- name: Activer ufw
  community.general.ufw:
    state: enabled
