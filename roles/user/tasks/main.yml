---
# tasks file for user
- name: Créer l'utilisateur {{ ssh_user }}
  ansible.builtin.user:
    name: "{{ ssh_user }}"
    shell: /bin/bash
    create_home: true
    state: present

- name: Ajouter {{ ssh_user }} au groupe sudo
  ansible.builtin.user:
    name: "{{ ssh_user }}"
    groups: sudo
    append: true
  
    
- name: Déployer la clé SSH publique
  ansible.posix.authorized_key:
    user: "{{ ssh_user }}"
    key: "{{ ssh_public_key }}"
    state: present
    exclusive: true

- name: Autoriser {{ ssh_user }} à utiliser sudo sans mot de passe
  ansible.builtin.copy:
    content: "{{ ssh_user }} ALL=(ALL) NOPASSWD:ALL"
    dest: "/etc/sudoers.d/{{ ssh_user }}"
    mode: '0440'
    validate: 'visudo -cf %s'

- name: Créer l'utilisateur {{ deploy_user }}
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    shell: /bin/bash
    create_home: true
    state: present

- name: Ajouter {{ deploy_user }} au groupe docker
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: docker
    append: true

- name: Déployer la clé SSH publique de l'utilisateur dédiée
  ansible.posix.authorized_key:
    user: "{{ deploy_user }}"
    key: "{{ deploy_public_key }}"
    state: present
    exclusive: true

- name: Créer les dossiers applicatifs
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ portfolio_path }}", mode: "0755" }
    - { path: "{{ houdat_path }}",    mode: "0750" }